{% extends 'studentapp/base.html' %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow rounded-4 p-4">
            <h3 class="fw-bold mb-3">Delete Student</h3>
            <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, delete</button>
                <a href="{% url 'student-list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
